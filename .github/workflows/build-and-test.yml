name: build and test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOTNET_VERSION: '10.0.100'

jobs:
  build-and-test:

    name: build-and-test-${{matrix.os}}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Verify documentation snippets
      shell: pwsh
      run: ./scripts/verify-doc-snippets.ps1

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Generate configuration reference docs
      shell: pwsh
      run: ./scripts/generate-config-docs.ps1 -Configuration Release -TargetFramework net10.0

    - name: Verify configuration docs are up to date
      shell: pwsh
      run: |
        $diff = git diff docs/configuration.md
        if ($diff) {
          Write-Host "[DIRTY] docs/configuration.md"
          exit 1
        }
        Write-Host "[OK] docs/configuration.md is up to date"

    - name: Test
      run: dotnet test --no-restore --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Code Coverage Report
      if: github.event_name == 'pull_request'
      run: |
        dotnet tool install -g dotnet-reportgenerator-globaltool
        reportgenerator -reports:coverage/**/coverage.cobertura.xml -targetdir:CodeCoverage -reporttypes:'HtmlInline;MarkdownSummaryGithub'

    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: CodeCoverage/SummaryGithub.md

    - name: Upload coverage report artifact
      uses: actions/upload-artifact@v4
      if: github.event_name == 'pull_request'
      with:
        name: CoverageReport
        path: CodeCoverage/*
